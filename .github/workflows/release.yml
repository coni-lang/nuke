name: Nuke Release
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true



      - name: Setup Coni
        uses: coni-lang/npkm/.github/actions/setup-coni@main

      - name: Setup NPKM
        uses: coni-lang/npkm/.github/actions/setup-npkm@main
        with:
          version: 'build-8'
          asset-name: 'npkm-coni-release-2026-06-03-0948.zip'
          
      - name: Build and Package Release
        run: |
          npkm package_release.edn

      - name: Generate Security Reports for Release Notes
        uses: coni-lang/npkm/.github/actions/security-report@main
        with:
          binary_path: dist/nuke/nuke-linux
          scan_dir: dist/
          output_file: release_notes.md
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: dist/*.zip
          body_path: release_notes.md
          generate_release_notes: true
