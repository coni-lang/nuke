name: Nuke Release
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Cache ClamAV Database
        uses: actions/cache@v4
        with:
          path: ~/clamav-db
          key: clamav-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            clamav-db-${{ runner.os }}-

      - name: Install ClamAV
        run: |
          sudo apt-get update && sudo apt-get install -y clamav
          mkdir -p ~/clamav-db
          sudo freshclam --datadir=$HOME/clamav-db || true
          

      - name: Setup Coni
        uses: coni-lang/npkm/.github/actions/setup-coni@main

      - name: Setup NPKM
        uses: coni-lang/npkm/.github/actions/setup-npkm@main
        with:
          version: 'build-8'
          asset-name: 'npkm-coni-release-2026-06-03-0948.zip'
          
      - name: Build and Package Release
        run: |
          npkm package_release.edn

      - name: Generate Security Reports for Release Notes
        run: |
          echo "## Security Audit & Guarantees" > release_notes.md
          
          echo "### 1. Go Vulnerability Check (govulncheck)" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          ~/go/bin/govulncheck -mode=binary $(which coni) >> release_notes.md || true
          echo "\`\`\`" >> release_notes.md
          
          echo "### 2. Shared Library Dependencies (ldd)" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          ldd dist/nuke/nuke-linux >> release_notes.md || true
          echo "\`\`\`" >> release_notes.md
          
          echo "### 3. Antivirus Scan (ClamAV)" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          clamscan -d $HOME/clamav-db -r dist/ >> release_notes.md || true
          echo "\`\`\`" >> release_notes.md
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: dist/*.zip
          body_path: release_notes.md
          generate_release_notes: true
